services:
  web:
    build: .
    ports:
      - "8084:8084"
    restart: unless-stopped
    environment:
      # Phase 14 / Option A ‚Äî propagated by PersonalPortfolio/.env.shared
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-local-dev}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-1.0}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-local-dev}
      - PYTHONUNBUFFERED=1
